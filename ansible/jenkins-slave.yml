---
- name: Configure EC2 as Jenkins SSH Agent
  hosts: jenkins_slave
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - openjdk-21-jdk
          - maven
          - git
          - docker.io
          - openssh-server
        state: present

    - name: Set Java 21 as default
      alternatives:
        name: java
        path: /usr/lib/jvm/java-21-openjdk-amd64/bin/java

    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ensure SSH service is started and enabled
      service:
        name: ssh
        state: started
        enabled: yes

    - name: Ensure docker group exists
      group:
        name: docker
        state: present

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create Jenkins workspace directory
      file:
        path: /home/ubuntu/jenkins
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Verify Java installation
      command: java -version
      register: java_version
      changed_when: false

    - name: Display Java version
      debug:
        var: java_version.stderr_lines

    - name: Verify Maven installation
      command: mvn -version
      register: maven_version
      changed_when: false

    - name: Display Maven version
      debug:
        var: maven_version.stdout_lines

    - name: Verify Git installation
      command: git --version
      register: git_version
      changed_when: false

    - name: Display Git version
      debug:
        var: git_version.stdout_lines

    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      debug:
        var: docker_version.stdout_lines